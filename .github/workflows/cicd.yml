name: FTP Deploy to Hostinger

on:
  push:
    branches:
      - dev
    paths:
      - 'blogger/public/**'
  workflow_dispatch:

jobs:
  ftp-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./blogger/public/
          server-dir: ./public_html/
          port: 21
          protocol: ftp
          dangerous-clean-slate: true  # Don't clean remote directory
          state-name: .sync-state.json  # Track deployment state
          exclude: |
            **/.git*
            **/.git*/**
            **/.DS_Store
            **/node_modules/**
            state.json
            .sync-state.json