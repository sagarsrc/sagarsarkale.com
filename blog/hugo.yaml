baseURL: https://sagarsarkale.com/
languageCode: en-us
paginate: 5
title: Sagar Sarkale
theme: ["PaperModX"]

enableInlineShortcodes: true
enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false
enableEmoji: true

googleAnalytics: G-NYRZDCP0VT

minify:
    disableXML: true
    minifyOutput: true

params:
    env: production # to enable google analytics, opengraph, twitter-cards and schema.
    title: "Sagar Sarkale"
    description: "My Learning Journey"
    keywords: [Blog, Portfolio, Sagar, Sarkale, Journey, Learning]
    author: "Sagar Sarkale"
    images: ["personal/aboutme_800x800.png"]
    DateFormat: "2 January 2006"
    defaultTheme: light # dark, light
    disableThemeToggle: false

    ShowReadingTime: true
    ShowShareButtons: true
    ShowPostNavLinks: true
    ShowAuthor: true
    ShowBreadCrumbs: true
    ShowCodeCopyButtons: true
    disableSpecial1stPost: false
    disableScrollToTop: false
    comments: false
    hidemeta: false
    hideSummary: false
    showtoc: false
    tocopen: false

    assets:
        # disableFingerprinting: true
        favicon: "favicon.ico"
        favicon16x16: "favicon-16x16.png"
        favicon32x32: "favicon-32x32.png"
        apple_touch_icon: "apple_touch_icon.png"
        safari_pinned_tab: "<link / abs url>"

    label:
        text: "Home"
        icon: "apple_touch_icon.png"
        iconHeight: 35

    # profile-mode
    profileMode:
        enabled: true # needs to be explicitly set
        title: "Sagar Sarkale"
        subtitle: "sharing my learning journey"
        imageUrl: "personal/about-me.jpeg"
        imageWidth: 180
        imageHeight: 180
        imageTitle: Profile Image
        buttons:
            - name: Blog
              url: /blog
            - name: My Work
              url: /work
        #     - name: Tags
        #       url: tags
        #     - name: About
        #       url: about

    # home-info mode
    homeInfoParams:
        Title: "Hi there \U0001F44B"
        Content: Welcome to my blog

    socialIcons:
        - name: linkedin
          url: "https://linkedin.com/in/sagar-sarkale"
        - name: twitter
          url: "https://twitter.com/sagarrgh"
        - name: gmail
          url: "https://mail.google.com/mail/?view=cm&fs=1&to=sagar@smallstep.ai&su=Hi%20Sagar&body=Let's chat!"
        # - name: stackoverflow
        #   url: "https://stackoverflow.com"
        # - name: github
        #   url: "https://github.com/"

    analytics:
        google:
            SiteVerificationTag: "XYZabc"
        bing:
            SiteVerificationTag: "XYZabc"
        yandex:
            SiteVerificationTag: "XYZabc"

    cover:
        hidden: false # hide everywhere but not in structured data
        hiddenInList: false # hide on list pages and home
        hiddenInSingle: true # hide on single page

    editPost:
        URL: "https://github.com/<path_to_repo>/content"
        Text: "Suggest Changes" # edit text
        appendFilePath: true # to append file path to Edit link

    # for search
    # https://fusejs.io/api/options.html
    fuseOpts:
        isCaseSensitive: false
        shouldSort: true
        location: 0
        distance: 1000
        threshold: 0.4
        minMatchCharLength: 0
        EnableInstantClick: true
        keys: ["title", "permalink", "summary", "content"]
menu:
    main:
        - identifier: search
          name: search
          url: /search/
          weight: 30
        - identifier: work
          name: work
          url: /work/
          weight: 30
        # - identifier: tags
        #   name: tags
        #   url: /tags/
        #   weight: 30
        - identifier: blog
          name: blog
          url: /blog/
          weight: 50
        - identifier: about
          name: about
          url: /about/
          weight: 100
# Read: https://github.com/reorx/hugo-PaperModX/wiki/FAQs#using-hugos-syntax-highlighter-chroma
pygmentsUseClasses: true
markup:
    highlight:
        # anchorLineNos: true
        codeFences: true
        guessSyntax: true
        lineNos: true
        style: monokai

outputs:
    HTML
    JSON
    RSS
